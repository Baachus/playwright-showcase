name: Playwright Tests
on:
  push:
    branches: ['**']
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * 2'    # nightly at 2am UTC on Tuesday
  workflow_dispatch:        # allow manual runs (e.g. to regenerate visual baselines)
jobs:
  smoke:
    name: Smoke Tests (@smoke)
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install chromium --with-deps
    - name: Run smoke tests
      run: npx playwright test --grep "@smoke" --project="Playwright.dev Chromium" --project="Saucedemo Chromium"
      env:
        SAUCEDEMO_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}
        SAUCEDEMO_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: smoke-report
        path: reports/html/
        retention-days: 14

  test:
    name: Full Test Suite
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs: smoke
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    # Pin to the official Playwright image matching @playwright/test in package.json.
    # Visual baselines are pixel-sensitive to the Chromium/font build, so the run
    # MUST use the same environment the *-linux.png baselines were generated in.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    # Browsers are preinstalled in the container; no `install --with-deps` needed.
    # Resolve the bundled Chromium binary path for Lighthouse (chrome-launcher).
    - name: Resolve Chromium path for Lighthouse
      run: |
        CHROME_BIN=$(find /ms-playwright -name 'chrome' -executable -type f | head -1)
        echo "CHROME_PATH=$CHROME_BIN" >> $GITHUB_ENV
    - name: Run Playwright tests
      run: npx playwright test
      env:
        # Firefox refuses to launch when $HOME is owned by a different user (pwuser).
        # GitHub Actions sets HOME=/github/home inside containers; override to /root.
        HOME: /root
        CHROME_PATH: ${{ env.CHROME_PATH }}
        SAUCEDEMO_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}
        SAUCEDEMO_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: reports/html/
        retention-days: 30

  update-visual-baselines:
    name: Regenerate Visual Baselines (manual)
    timeout-minutes: 30
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    # Same pinned image as the test job so generated baselines match CI renders.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Update visual snapshots
      run: npx playwright test tests/visual --project=Visual --update-snapshots
    # Upload the regenerated PNGs so they can be reviewed and committed to the repo.
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: updated-visual-baselines
        path: tests/visual/**/*-linux.png
        retention-days: 7
