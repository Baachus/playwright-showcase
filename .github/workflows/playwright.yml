name: Playwright Tests
on:
  push:
    branches: ['**']
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * 2'    # nightly at 2am UTC on Tuesday
jobs:
  smoke:
    name: Smoke Tests (@smoke)
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install chromium --with-deps
    - name: Run smoke tests
      run: npx playwright test --grep "@smoke" --project="Playwright.dev Chromium" --project="Saucedemo Chromium"
      env:
        SAUCEDEMO_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}
        SAUCEDEMO_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: smoke-report
        path: reports/html/
        retention-days: 14

  test:
    name: Full Test Suite
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs: smoke
    if: github.event_name == 'schedule'
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
      env:
        SAUCEDEMO_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}
        SAUCEDEMO_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: reports/html/
        retention-days: 30
